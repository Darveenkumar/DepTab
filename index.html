
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
.inv-root{
  background:#0d0d0d;border-radius:16px;padding:14px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.inv-card{
  display:flex;align-items:center;gap:14px;
  padding:15px 16px;background:#161616;
  border:1px solid rgba(255,255,255,0.07);border-radius:12px;
  text-decoration:none;cursor:pointer;
  transition:background 0.15s,border-color 0.15s;
  position:relative;overflow:hidden;
}
.inv-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
}
.inv-card:hover{background:#1e1e1e;border-color:rgba(255,255,255,0.14);}
.inv-card:hover .inv-arr{opacity:1;}
.inv-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0;
  border:1px solid rgba(255,255,255,0.09);
}
.inv-body{flex:1;min-width:0;}
.inv-name{
  font-family:'Orbitron',sans-serif;
  font-size:11.5px;font-weight:700;
  color:#e8e8e8;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:4px;letter-spacing:0.04em;
}
.inv-sub{font-family:system-ui,-apple-system,sans-serif;font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:0.02em;}
.inv-arr{font-size:16px;flex-shrink:0;opacity:0.35;transition:opacity 0.15s;}

.i-blue{color:#378ADD;border-color:rgba(55,138,221,0.3);background:rgba(55,138,221,0.1);}
.a-blue{color:#378ADD;}
.i-cyan{color:#00dcff;border-color:rgba(0,220,255,0.3);background:rgba(0,220,255,0.08);}
.a-cyan{color:#00dcff;}
.i-purple{color:#7F77DD;border-color:rgba(127,119,221,0.3);background:rgba(127,119,221,0.1);}
.a-purple{color:#7F77DD;}
.i-teal{color:#1D9E75;border-color:rgba(29,158,117,0.3);background:rgba(29,158,117,0.1);}
.a-teal{color:#1D9E75;}
</style>

<div class="inv-root">

  <a class="inv-card" href="#">
    <div class="inv-icon i-blue"><i class="ti ti-file-spreadsheet" aria-hidden="true"></i></div>
    <div class="inv-body">
      <div class="inv-name">ITSM Inventory</div>
      <div class="inv-sub">Microsoft List</div>
    </div>
    <i class="ti ti-arrow-up-right inv-arr a-blue" aria-hidden="true"></i>
  </a>

  <a class="inv-card" href="https://mcmcmalaysia.sharepoint.com/sites/EISDSite/Lists/Inventory/AllItems.aspx?viewid=108b6427%2D4487%2D484e%2D811c%2Dd61af72172e1">
    <div class="inv-icon i-cyan"><i class="ti ti-file-spreadsheet" aria-hidden="true"></i></div>
    <div class="inv-body">
      <div class="inv-name">EISD Inventory</div>
      <div class="inv-sub">Microsoft List</div>
    </div>
    <i class="ti ti-arrow-up-right inv-arr a-cyan" aria-hidden="true"></i>
  </a>

  <a class="inv-card" href="#">
    <div class="inv-icon i-purple"><i class="ti ti-file-spreadsheet" aria-hidden="true"></i></div>
    <div class="inv-body">
      <div class="inv-name">NOSD Inventory</div>
      <div class="inv-sub">Microsoft List</div>
    </div>
    <i class="ti ti-arrow-up-right inv-arr a-purple" aria-hidden="true"></i>
  </a>

  <a class="inv-card" href="#">
    <div class="inv-icon i-teal"><i class="ti ti-file-spreadsheet" aria-hidden="true"></i></div>
    <div class="inv-body">
      <div class="inv-name">DTGD Inventory</div>
      <div class="inv-sub">Microsoft List</div>
    </div>
    <i class="ti ti-arrow-up-right inv-arr a-teal" aria-hidden="true"></i>
  </a>

</div>
