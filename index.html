<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}

.inv-root {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  background: transparent; /* Fully transparent container */
}

/* --- LIQUID GLASS CARDS --- */
.inv-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  border-radius: 14px;
  
  /* Glassmorphism Base */
  background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.15));
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
  transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
}

/* Refractive Glass Border */
.inv-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 14px;
  padding: 1px;
  background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.02) 40%, rgba(255,255,255,0.1));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  z-index: 2;
}

/* Top Edge Highlight */
.inv-card::after {
  content: '';
  position: absolute;
  top: 0; left: 15%; right: 15%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  z-index: 2;
}

/* Hover Effects */
.inv-card:hover {
  background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(0, 220, 255, 0.05));
  transform: translateY(-2px);
  box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(0, 220, 255, 0.05);
}
.inv-card:hover .inv-arr {
  opacity: 1;
  transform: translate(2px, -2px);
}

/* --- INNER CONTENT --- */
.inv-icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 1px solid rgba(255, 255, 255, 0.15);
  position: relative;
  z-index: 3;
  backdrop-filter: blur(10px);
}

.inv-body { flex: 1; min-width: 0; z-index: 3; position: relative; }

.inv-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: #ffffff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
  letter-spacing: 0.04em;
}

.inv-sub {
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
  letter-spacing: 0.02em;
}

.inv-arr {
  font-size: 18px;
  flex-shrink: 0;
  opacity: 0.4;
  transition: all 0.2s ease;
  z-index: 3;
  position: relative;
}

/* --- DEPARTMENT GLOW COLORS --- */
.i-blue { color: #5bc0de; border-color: rgba(91, 192, 222, 0.4); background: rgba(91, 192, 222, 0.15); box-shadow: 0 0 15px rgba(91, 192, 222, 0.2); }
.a-blue { color: #5bc0de; }

.i-cyan { color: #00dcff; border-color: rgba(0, 220, 255, 0.4); background: rgba(0, 220, 255, 0.15); box-shadow: 0 0 15px rgba(0, 220, 255, 0.2); }
.a-cyan { color: #00dcff; }

.i-purple { color: #a084fa; border-color: rgba(160, 132, 250, 0.4); background: rgba(160, 132, 250, 0.15); box-shadow: 0 0 15px rgba(160, 132, 250, 0.2); }
.a-purple { color: #a084fa; }

.i-teal { color: #20c997; border-color: rgba(32, 201, 151, 0.4); background: rgba(32, 201, 151, 0.15); box-shadow: 0 0 15px rgba(32, 201, 151, 0.2); }
.a-teal { color: #20c997; }
</style>

<div class="inv-root">

  <a class="inv-card" href="#">
    <div class="inv-icon i-blue"><i class="ti ti-headset" aria-hidden="true"></i></div>
    <div class="inv-body">
      <div class="inv-name">ITSM Inventory</div>
      <div class="inv-sub">Microsoft List</div>
    </div>
    <i class="ti ti-arrow-up-right inv-arr a-blue" aria-hidden="true"></i>
  </a>

  <a class="inv-card" href="https://mcmcmalaysia.sharepoint.com/sites/EISDSite/Lists/Inventory/AllItems.aspx?viewid=108b6427%2D4487%2D484e%2D811c%2Dd61af72172e1">
    <div class="inv-icon i-cyan"><i class="ti ti-server-cog" aria-hidden="true"></i></div>
    <div class="inv-body">
      <div class="inv-name">EISD Inventory</div>
      <div class="inv-sub">Microsoft List</div>
    </div>
    <i class="ti ti-arrow-up-right inv-arr a-cyan" aria-hidden="true"></i>
  </a>

  <a class="inv-card" href="#">
    <div class="inv-icon i-purple"><i class="ti ti-network" aria-hidden="true"></i></div>
    <div class="inv-body">
      <div class="inv-name">NOSD Inventory</div>
      <div class="inv-sub">Microsoft List</div>
    </div>
    <i class="ti ti-arrow-up-right inv-arr a-purple" aria-hidden="true"></i>
  </a>

  <a class="inv-card" href="#">
    <div class="inv-icon i-teal"><i class="ti ti-shield-check" aria-hidden="true"></i></div>
    <div class="inv-body">
      <div class="inv-name">DTGD Inventory</div>
      <div class="inv-sub">Microsoft List</div>
    </div>
    <i class="ti ti-arrow-up-right inv-arr a-teal" aria-hidden="true"></i>
  </a>

</div>
